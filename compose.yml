services:

  # FastAPI backend — REST API + static file server
  # Start with: podman compose up backend
  backend:
    image: python:3.11-slim
    volumes:
      - .:/app
      - ./data:/app/data
      - pipcache:/root/.cache/pip
    working_dir: /app/backend
    # Skip pip when packages are already installed (restart works offline);
    # otherwise install with long timeouts — PyPI via the Podman VM is flaky.
    command: >
      sh -c "(python -c 'import fastapi, uvicorn, httpx' 2>/dev/null || pip install -q --retries 10 --timeout 60 fastapi uvicorn httpx) && sh /app/backend/start.sh"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_PATH=/app/data/story.db
      - OLLAMA_HOST=http://172.24.0.1:11434
    restart: unless-stopped

  # One-shot: offline workflow — regenerates story summaries for all games
  # For low-power systems: turn off live summarization in the game, then
  # run this after the session. Run with: podman compose run --rm workflow
  workflow:
    image: python:3.11-slim
    volumes:
      - .:/app
      - ./data:/app/data
      - pipcache:/root/.cache/pip
    working_dir: /app/backend
    command: >
      sh -c "(python -c 'import httpx' 2>/dev/null || pip install -q --retries 10 --timeout 60 httpx) && python workflow.py"
    environment:
      - DATABASE_PATH=/app/data/story.db
      - OLLAMA_HOST=http://172.24.0.1:11434

  # One-shot: plays 30 turns and writes an analysis report to tests/reports/
  # Run with: podman compose run --rm tester
  tester:
    image: python:3.11-slim
    volumes:
      - .:/app
      - pipcache:/root/.cache/pip
    working_dir: /app
    command: >
      sh -c "(python -c 'import requests' 2>/dev/null || pip install -q --retries 10 --timeout 60 requests) && python tests/test_playthrough.py"
    stdin_open: true
    tty: true
    depends_on:
      - backend

  # One-shot: downloads Bootstrap + jQuery into libs/
  # Run once with: podman compose run --rm downloader
  downloader:
    image: python:3.11-slim
    volumes:
      - .:/downloads
    working_dir: /downloads
    command: python download.py --libs-only

# Shared pip download cache — survives container re-creation
volumes:
  pipcache:

